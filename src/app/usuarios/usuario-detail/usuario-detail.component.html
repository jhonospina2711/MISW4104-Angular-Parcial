<div *ngIf="usuario" class="glass-card p-6 animate-fade-in">
  <div class="flex flex-col items-center mb-6">
    <img [src]="usuario.avatarUrl" class="w-20 h-20 rounded-full border-2 border-[var(--gold)] mb-3">
    <h2 class="text-xl font-bold text-[var(--text-primary)]">{{ usuario.name }}</h2>
    <p class="text-xs text-[var(--text-dim)]">{{ usuario.username }}</p>
  </div>

  <hr class="border-white/5 mb-6">

  <div>
    <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-[var(--gold)] mb-4">
      Repositorios Asignados
    </h3>

    <div class="grid grid-cols-1 gap-3">
      <div *ngFor="let repo of repositorios" [routerLink]="['/repositorios', repo.id]"
        class="cursor-pointer p-3 rounded bg-[var(--surface-2)] hover:border-[var(--gold)]/50 border border-transparent transition-all">
        <span class="text-[var(--gold)] font-bold">#{{ repo.id }}</span>
        <span class="ml-2 text-[var(--text-primary)]">{{ repo.name }}</span>
      </div>
    </div>

    <p *ngIf="repositorios.length === 0" class="text-xs text-center text-[var(--text-muted)] italic">
      No hay repositorios asignados.
    </p>
    <router-outlet></router-outlet>
  </div>
</div>
